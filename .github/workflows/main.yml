# The following configuration is used to setup GitHub Actions
# for building (and running unit tests) on pushes and PRs.
# At the moment, we build on two runner types: Linux and MacOS,
# specific version information can be found further below.
name: Build On Changes

on: [pull_request]

env:
  SAC2C_URL: https://gitlab.sac-home.org/sac-group/sac2c.git
  INTTEST_URL: https://github.com/SacBase/IntegrationTests.git

jobs:
  build-ubuntu24:
    runs-on: ubuntu-24.04
    steps:
    - name: Get HEAD and submodules
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: 'recursive'
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install xsltproc -y
    - name: Install sac2c
      run: |
        git clone --single-branch --recursive ${SAC2C_URL} sac2c
        cd sac2c
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RELEASE
        cmake --build build -j4
        ln -s $(PWD)/build/sac2c_p /usr/local/bin/sac2c
        sac2c -V
    - name: Configure build system
      run: |
        cmake -S . -B build -G Ninja
    - name: Build
      shell: bash
      run: |
        cmake --build build -j4 2>&1 | tee build.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "!!! ERROR detected in build !!!";
          exit 1;
        fi
        ${GITHUB_WORKSPACE}/ci/fail-on-warning.sh build.log
    - name: Test
      shell: bash
      run: |
        git clone --single-branch --recursive ${INTTEST_URL} inttest
        cd inttest
        make all
        ./test.sh

  build-macos-arm:
    runs-on: macos-latest
    steps:
    - name: Get HEAD and submodules
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: 'recursive'
    - name: Install dependencies
      run: |
        brew update
        brew install libxslt
    - name: Set XCode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Install sac2c
      run: |
        git clone --single-branch --recursive ${SAC2C_URL} sac2c
        cd sac2c
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RELEASE
        cmake --build build -j3
        ln -s $(PWD)/build/sac2c_p /usr/local/bin/sac2c
        sac2c -V
    - name: Configure build system
      run: |
        cmake -S . -B build -G Ninja
    - name: Build
      shell: bash
      run: |
        cmake --build build -j3 2>&1 | tee build.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "!!! ERROR detected in build !!!";
          exit 1;
        fi
        ${GITHUB_WORKSPACE}/ci/fail-on-warning.sh build.log
    - name: Test
      shell: bash
      run: |
        git clone --single-branch --recursive ${INTTEST_URL} inttest
        cd inttest
        make all
        ./test.sh
